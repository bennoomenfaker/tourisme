services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - tourisme_pgdata:/var/lib/postgresql/data
    networks:
      - tourisme_net
    # port 5432 is NOT exposed to the host (internal only)

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - tourisme_miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - tourisme_net

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - tourisme_mongodata:/data/db
    networks:
      - tourisme_net
    # port 27017 is NOT exposed to the host (internal only)

  # ── NestJS API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3000"
    env_file:
      - ./backend/.env.production
    depends_on:
      - db
      - mongo
      - minio
    networks:
      - tourisme_net

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://ecovoyage.duckdns.org:3003/api
    restart: unless-stopped
    ports:
      - "3004:3000"
    depends_on:
      - api
    networks:
      - tourisme_net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  tourisme_net:
    external: true

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  tourisme_pgdata:
  tourisme_mongodata:
  tourisme_miniodata:

name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ecovoyage-api ./backend

      - name: Build frontend image
        run: docker build -t ecovoyage-web ./frontend
